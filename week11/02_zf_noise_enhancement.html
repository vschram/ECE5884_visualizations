<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>ZF noise enhancement</title>
<style>
:root{--ink:#17202a;--muted:#5f6b76;--line:#d9dee3;--panel:#f6f7f8;--accent:#234a73;--bad:#8a3d32;--good:#2f6f4e}
*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--ink)}main{max-width:1100px;margin:auto;padding:22px}h1{font-size:1.45rem;margin:0 0 6px}.intro{color:var(--muted);margin:0 0 18px;line-height:1.45}.layout{display:grid;grid-template-columns:330px 1fr;gap:18px}.panel{border:1px solid var(--line);border-radius:10px;padding:16px}.controls{background:var(--panel)}label{display:block;font-size:.86rem;margin-top:14px}input[type=range]{width:100%}.readout{font-variant-numeric:tabular-nums;font-weight:650}.buttons{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}button{border:1px solid #aab3bb;background:white;border-radius:7px;padding:8px 10px;cursor:pointer}.formula{margin-top:15px;padding:11px;background:white;border-left:4px solid var(--accent);font-family:Cambria,Georgia,serif;line-height:1.55}.vizgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}canvas{width:100%;height:auto;border:1px solid var(--line);border-radius:8px}.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-top:12px}.metric{border:1px solid var(--line);border-radius:8px;padding:9px}.metric span{display:block;color:var(--muted);font-size:.74rem}.metric b{font-variant-numeric:tabular-nums}.explain{margin-top:12px;color:var(--muted);font-size:.86rem;line-height:1.45}@media(max-width:850px){.layout{grid-template-columns:1fr}.vizgrid{grid-template-columns:1fr}}@media(max-width:560px){.metrics{grid-template-columns:1fr 1fr}}
</style>
</head>
<body><main>
<h1>ZF noise enhancement</h1>
<p class="intro">Move the channel columns closer together. Zero forcing can still separate the streams, but the inverse must become very large and therefore amplifies receiver noise.</p>
<div class="layout">
<section class="panel controls">
<h2 style="font-size:1.05rem;margin-top:0">Channel</h2>
<div style="font-family:Cambria,Georgia,serif;font-size:1.12rem">H = [ 1 &nbsp; ρ ; &nbsp; ρ &nbsp; 1 ]</div>
<label>Column correlation parameter ρ: <span class="readout" id="rhoVal"></span></label><input id="rho" type="range" min="0" max="0.98" step="0.01" value="0.50">
<label>Total transmit SNR E<sub>x</sub>/N<sub>0</sub>: <span class="readout" id="snrVal"></span></label><input id="snr" type="range" min="-5" max="30" step="1" value="10">
<div class="buttons"><button data-rho="0">Orthogonal</button><button data-rho="0.5">Deck H₁</button><button data-rho="0.9">Deck H₂</button></div>
<div class="formula" id="formula"></div>
</section>
<section class="panel">
<div class="vizgrid"><canvas id="geom" width="440" height="300"></canvas><canvas id="bars" width="440" height="300"></canvas></div>
<div class="metrics">
<div class="metric"><span>Small singular value σ₂</span><b id="sigma2"></b></div>
<div class="metric"><span>Condition number κ</span><b id="cond"></b></div>
<div class="metric"><span>Inverse diagonal</span><b id="invdiag"></b></div>
<div class="metric"><span>ZF output SNR</span><b id="outSNR"></b></div>
</div>
<p class="explain" id="explain"></p>
</section></div>
</main>
<script>
'use strict';
const rhoEl=document.getElementById('rho'),snrEl=document.getElementById('snr');
const geom=document.getElementById('geom'),g=geom.getContext('2d');const bars=document.getElementById('bars'),b=bars.getContext('2d');
function arrow(ctx,x0,y0,x1,y1,color,label){const a=Math.atan2(y1-y0,x1-x0);ctx.strokeStyle=color;ctx.fillStyle=color;ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(x0,y0);ctx.lineTo(x1,y1);ctx.stroke();ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x1-11*Math.cos(a-.45),y1-11*Math.sin(a-.45));ctx.lineTo(x1-11*Math.cos(a+.45),y1-11*Math.sin(a+.45));ctx.closePath();ctx.fill();ctx.font='13px system-ui';ctx.fillText(label,x1+6,y1-6)}
function drawGeometry(rho){g.clearRect(0,0,geom.width,geom.height);const cx=geom.width/2,cy=geom.height/2,scale=105;g.strokeStyle='#e2e6e9';g.lineWidth=1;g.beginPath();g.moveTo(35,cy);g.lineTo(geom.width-25,cy);g.moveTo(cx,25);g.lineTo(cx,geom.height-25);g.stroke();arrow(g,cx,cy,cx+scale,cy-scale*rho,'#315d8a','h₁');arrow(g,cx,cy,cx+scale*rho,cy-scale,'#8a5a31','h₂');const dot=2*rho,den=1+rho*rho,angle=Math.acos(Math.min(1,dot/den))*180/Math.PI;g.fillStyle='#17202a';g.font='bold 14px system-ui';g.fillText('Channel columns',15,22);g.font='13px system-ui';g.fillStyle='#5f6b76';g.fillText(`angle = ${angle.toFixed(1)}°`,15,44);}
function drawBars(s1,s2,gammaDb){b.clearRect(0,0,bars.width,bars.height);b.fillStyle='#17202a';b.font='bold 14px system-ui';b.fillText('Singular values and ZF SNR',15,22);const base=250,maxSig=2,barW=52;const vals=[s1,s2];vals.forEach((v,i)=>{const h=150*v/maxSig;b.fillStyle=i===0?'#315d8a':'#8a5a31';b.fillRect(55+i*85,base-h,barW,h);b.fillStyle='#17202a';b.font='12px system-ui';b.fillText(`σ${i+1}=${v.toFixed(2)}`,48+i*85,base+20)});const clamped=Math.max(-20,Math.min(30,gammaDb)),h=150*(clamped+20)/50;b.fillStyle=gammaDb<0?'#8a3d32':'#2f6f4e';b.fillRect(300,base-h,65,h);b.fillStyle='#17202a';b.fillText(`γZF=${gammaDb.toFixed(1)} dB`,272,base+20);b.strokeStyle='#aab3bb';b.beginPath();b.moveTo(25,base);b.lineTo(415,base);b.stroke();}
function update(){const rho=+rhoEl.value,snrDb=+snrEl.value,total=10**(snrDb/10);const s1=1+rho,s2=1-rho,cond=s1/s2;const invdiag=(1+rho*rho)/((1-rho*rho)**2);const gamma=total/(2*invdiag),gammaDb=10*Math.log10(gamma);document.getElementById('rhoVal').textContent=rho.toFixed(2);document.getElementById('snrVal').textContent=`${snrDb.toFixed(0)} dB`;document.getElementById('sigma2').textContent=s2.toFixed(3);document.getElementById('cond').textContent=cond.toFixed(2);document.getElementById('invdiag').textContent=invdiag.toFixed(2);document.getElementById('outSNR').textContent=`${gamma.toFixed(3)} (${gammaDb.toFixed(1)} dB)`;document.getElementById('formula').innerHTML=`[(H<sup>H</sup>H)<sup>−1</sup>]<sub>jj</sub> = (1+ρ²)/(1−ρ²)² = ${invdiag.toFixed(2)}<br>γ<sub>j</sub><sup>ZF</sup> = (E<sub>x</sub>/2N<sub>0</sub>) / [(H<sup>H</sup>H)<sup>−1</sup>]<sub>jj</sub>`;document.getElementById('explain').textContent=rho<.3?'The channel columns are well separated, so ZF needs little noise amplification.':rho<.75?'The columns are becoming similar. The weak singular mode shrinks and ZF output SNR falls.':'The columns are nearly parallel. ZF mathematically separates them by strongly amplifying the weak mode and the noise on it.';drawGeometry(rho);drawBars(s1,s2,gammaDb);document.body.dataset.ready='true';window.__visualState={rho,s1,s2,cond,invdiag,gamma,gammaDb};}
rhoEl.addEventListener('input',update);snrEl.addEventListener('input',update);document.querySelectorAll('button[data-rho]').forEach(btn=>btn.addEventListener('click',()=>{rhoEl.value=btn.dataset.rho;update()}));update();
</script></body></html>
